<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>VibeCurve — Backend Architecture</title>
<style>
  html,body{margin:0;padding:0;background:#f4f6fb;font-family:"Segoe UI",Inter,Arial,sans-serif;}
  .wrap{width:1600px;margin:0 auto;padding:24px;box-sizing:border-box;}
  @media print{ @page{size:1600px 1040px;margin:0;} body{background:#fff;} .wrap{padding:0;} }
  svg{display:block;}
  .hint{width:1600px;margin:8px auto 0;color:#64748b;font-size:13px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
<svg width="1600" height="1040" viewBox="0 0 1600 1040" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f4f6fb"/>
    </linearGradient>
    <linearGradient id="curve" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/><stop offset="0.5" stop-color="#eab308"/><stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#334155"/>
    </marker>
    <marker id="arrO" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#FF9900"/>
    </marker>
    <marker id="arrB" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4285F4"/>
    </marker>
    <marker id="arrP" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="1040" fill="url(#bg)"/>

  <!-- Title -->
  <rect x="40" y="28" width="6" height="58" rx="3" fill="url(#curve)"/>
  <text x="62" y="58" font-size="32" font-weight="700" fill="#0f172a">VibeCurve — Backend Architecture</text>
  <text x="62" y="82" font-size="15" fill="#64748b">Next.js 15 front end on Vercel · serverless API routes · Amazon DynamoDB single-table back end (GSI1 matching · Streams · TTL "midnight burn")</text>
  <path d="M1180 56 q30 -26 60 0 t60 0 t60 0 t60 0" stroke="url(#curve)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- ================= COLUMN A: CLIENT ================= -->
  <g filter="url(#sh)">
    <rect x="40" y="120" width="360" height="780" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <rect x="40" y="120" width="360" height="52" rx="18" fill="#eef2ff"/>
  <rect x="40" y="150" width="360" height="22" fill="#eef2ff"/>
  <circle cx="70" cy="146" r="9" fill="#6366f1"/>
  <text x="90" y="152" font-size="18" font-weight="700" fill="#3730a3">CLIENT · Browser / PWA</text>

  <g font-size="14" fill="#0f172a">
    <rect x="64" y="196" width="312" height="120" rx="12" fill="#f8faff" stroke="#c7d2fe"/>
    <text x="84" y="224" font-size="16" font-weight="700" fill="#3730a3">VibeCurve UI</text>
    <text x="84" y="250" fill="#334155">Next.js 15 App Router · React 19 · TS</text>
    <text x="84" y="272" fill="#334155">Tailwind · Framer Motion · GSAP</text>
    <text x="84" y="294" fill="#334155">Three.js / R3F · Lenis · Zustand store</text>

    <rect x="64" y="332" width="312" height="92" rx="12" fill="#f8faff" stroke="#c7d2fe"/>
    <text x="84" y="360" font-size="15" font-weight="700" fill="#3730a3">VibeCheck curve canvas</text>
    <text x="84" y="384" fill="#334155">Draw day as 5 points → L/M/H</text>
    <text x="84" y="406" fill="#334155">signature, colour-graded live</text>

    <rect x="64" y="440" width="312" height="92" rx="12" fill="#f8faff" stroke="#c7d2fe"/>
    <text x="84" y="468" font-size="15" font-weight="700" fill="#3730a3">Parallel Room</text>
    <text x="84" y="492" fill="#334155">Emoji chat · stickers · voice notes</text>
    <text x="84" y="514" fill="#334155">Polls room state every few seconds</text>

    <rect x="64" y="548" width="312" height="96" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="84" y="576" font-size="15" font-weight="700" fill="#c2410c">Group voice call (WebRTC)</text>
    <text x="84" y="600" fill="#334155">Audio is peer-to-peer between</text>
    <text x="84" y="622" fill="#334155">browsers — never hits the server</text>
  </g>

  <!-- WebRTC P2P self loop -->
  <path d="M150 644 q-70 60 0 110 q70 -50 200 0" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-dasharray="6 5" marker-end="url(#arrP)"/>
  <text x="96" y="742" font-size="12.5" fill="#7c3aed" font-weight="600">P2P audio (SRTP) · peer ⇄ peer</text>
  <text x="96" y="762" font-size="12" fill="#94a3b8">only SDP/ICE signaling is relayed →</text>

  <!-- ================= COLUMN B: VERCEL ================= -->
  <g filter="url(#sh)">
    <rect x="470" y="120" width="610" height="780" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <rect x="470" y="120" width="610" height="52" rx="18" fill="#111827"/>
  <rect x="470" y="150" width="610" height="22" fill="#111827"/>
  <path d="M500 154 l13 -22 l13 22 z" fill="#ffffff"/>
  <text x="536" y="152" font-size="18" font-weight="700" fill="#ffffff">VERCEL · hosting + serverless (on AWS Lambda)</text>

  <!-- Front end delivery -->
  <rect x="494" y="196" width="562" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="514" y="224" font-size="16" font-weight="700" fill="#0f172a">Edge network · SSR / static assets</text>
  <text x="514" y="250" font-size="14" fill="#334155">Serves the Next.js front end · auto-deploys from GitHub `main`</text>
  <text x="514" y="272" font-size="14" fill="#334155">Live: vibecurve.vercel.app</text>

  <!-- API routes group -->
  <rect x="494" y="306" width="562" height="402" rx="12" fill="#0b1220" stroke="#1f2937"/>
  <text x="514" y="334" font-size="16" font-weight="700" fill="#e2e8f0">Next.js API Routes — serverless functions</text>
  <text x="514" y="356" font-size="12.5" fill="#94a3b8">@aws-sdk/lib-dynamodb DocumentClient · creds via VC_AWS_* (Vercel reserves AWS_*)</text>

  <g font-size="13.5">
    <rect x="514" y="372" width="522" height="46" rx="9" fill="#111c33" stroke="#334155"/>
    <text x="532" y="392" font-weight="700" fill="#a5b4fc">POST /api/curve</text>
    <text x="532" y="410" fill="#cbd5e1">submitCurve → match into a Parallel Room</text>
    <text x="1018" y="398" text-anchor="end" font-size="12" fill="#64748b">🔒 NextAuth</text>

    <rect x="514" y="426" width="522" height="46" rx="9" fill="#111c33" stroke="#334155"/>
    <text x="532" y="446" font-weight="700" fill="#a5b4fc">GET · POST /api/room/[id]</text>
    <text x="532" y="464" fill="#cbd5e1">getRoom (poll) · postMessage (text / sticker / voice)</text>

    <rect x="514" y="480" width="522" height="46" rx="9" fill="#111c33" stroke="#334155"/>
    <text x="532" y="500" font-weight="700" fill="#a5b4fc">GET · POST /api/room/[id]/call</text>
    <text x="532" y="518" fill="#cbd5e1">WebRTC presence + SDP/ICE signaling relay</text>

    <rect x="514" y="534" width="522" height="46" rx="9" fill="#111c33" stroke="#334155"/>
    <text x="532" y="554" font-weight="700" fill="#a5b4fc">GET /api/room/[id]/media</text>
    <text x="532" y="572" fill="#cbd5e1">streams a stored voice clip by message id</text>

    <rect x="514" y="588" width="522" height="46" rx="9" fill="#111c33" stroke="#334155"/>
    <text x="532" y="608" font-weight="700" fill="#a5b4fc">GET · POST /api/profile</text>
    <text x="532" y="626" fill="#cbd5e1">getProfile / saveProfile — permanent (no TTL)</text>
    <text x="1018" y="614" text-anchor="end" font-size="12" fill="#64748b">🔒 NextAuth</text>

    <rect x="514" y="642" width="522" height="46" rx="9" fill="#1a1230" stroke="#4c1d95"/>
    <text x="532" y="662" font-weight="700" fill="#c4b5fd">/api/auth/[...nextauth]</text>
    <text x="532" y="680" fill="#cbd5e1">NextAuth — Google OAuth · signed session (JWT)</text>
  </g>

  <!-- in-memory fallback note -->
  <rect x="494" y="724" width="562" height="56" rx="10" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="514" y="748" font-size="13.5" font-weight="700" fill="#475569">Graceful fallback</text>
  <text x="514" y="768" font-size="13" fill="#64748b">No AWS creds (local dev) → identical in-memory store; one code path swaps to DynamoDB in prod.</text>

  <!-- ================= COLUMN C: AWS ================= -->
  <g filter="url(#sh)">
    <rect x="1150" y="120" width="410" height="780" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <rect x="1150" y="120" width="410" height="52" rx="18" fill="#232f3e"/>
  <rect x="1150" y="150" width="410" height="22" fill="#232f3e"/>
  <path d="M1176 150 q12 8 24 0" stroke="#FF9900" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <text x="1212" y="152" font-size="18" font-weight="700" fill="#ffffff">AWS</text>
  <text x="1262" y="152" font-size="13" fill="#FF9900">Cloud back end</text>

  <!-- DynamoDB main card -->
  <rect x="1174" y="196" width="362" height="470" rx="14" fill="#f7f9ff" stroke="#c7d2fe"/>
  <rect x="1174" y="196" width="362" height="62" rx="14" fill="#2e27ad"/>
  <rect x="1174" y="238" width="362" height="20" fill="#2e27ad"/>
  <rect x="1196" y="214" width="26" height="26" rx="5" fill="#4053d6"/>
  <path d="M1196 220 q13 9 26 0 v14 q-13 9 -26 0 z" fill="#7b8cf0"/>
  <text x="1234" y="232" font-size="18" font-weight="700" fill="#ffffff">Amazon DynamoDB</text>
  <text x="1234" y="251" font-size="12.5" fill="#c7d0ff">single table · on-demand (PAY_PER_REQUEST)</text>

  <text x="1196" y="288" font-size="14" font-weight="700" fill="#0f172a">Table: &quot;VibeCurve&quot;  ·  PK / SK</text>

  <g font-size="12.5" fill="#334155">
    <rect x="1196" y="300" width="318" height="22" rx="5" fill="#eef2ff"/>
    <text x="1206" y="316"><tspan font-weight="700" fill="#3730a3">USER#</tspan>{id} · <tspan font-weight="700" fill="#3730a3">CURVE#</tspan>{date} — drawn curve</text>
    <rect x="1196" y="326" width="318" height="22" rx="5" fill="#eef2ff"/>
    <text x="1206" y="342"><tspan font-weight="700" fill="#3730a3">USER#</tspan>{id} · <tspan font-weight="700" fill="#3730a3">PROFILE</tspan> — permanent (no TTL)</text>
    <rect x="1196" y="352" width="318" height="22" rx="5" fill="#eef2ff"/>
    <text x="1206" y="368"><tspan font-weight="700" fill="#3730a3">ROOM#</tspan>{id} · META / MEMBER# / MSG#</text>
    <rect x="1196" y="378" width="318" height="22" rx="5" fill="#eef2ff"/>
    <text x="1206" y="394"><tspan font-weight="700" fill="#3730a3">ROOM#</tspan>{id} · CALL# / SIG# (WebRTC)</text>
  </g>

  <!-- GSI1 -->
  <rect x="1196" y="412" width="318" height="68" rx="10" fill="#fff" stroke="#a5b4fc"/>
  <text x="1210" y="434" font-size="14" font-weight="700" fill="#3730a3">GSI1  (GSI1PK / GSI1SK)</text>
  <text x="1210" y="455" font-size="12.5" fill="#334155">DATE#{date}#BUCKET#{sig} → shape match</text>
  <text x="1210" y="473" font-size="12.5" fill="#334155">DATE#{date}#AFF#{key} → affinity match</text>

  <!-- TTL -->
  <rect x="1196" y="490" width="154" height="64" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="1210" y="512" font-size="13.5" font-weight="700" fill="#b91c1c">TTL → midnight</text>
  <text x="1210" y="531" font-size="11.5" fill="#7f1d1d">rooms · curves · msgs</text>
  <text x="1210" y="547" font-size="11.5" fill="#7f1d1d">auto-burn at 00:00</text>

  <!-- Streams -->
  <rect x="1360" y="490" width="154" height="64" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="1374" y="512" font-size="13.5" font-weight="700" fill="#0e7490">DynamoDB Streams</text>
  <text x="1374" y="531" font-size="11.5" fill="#155e75">NEW_AND_OLD_IMAGES</text>
  <text x="1374" y="547" font-size="11.5" fill="#155e75">change feed ready</text>

  <!-- conditional write note -->
  <rect x="1196" y="566" width="318" height="78" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="1210" y="588" font-size="13.5" font-weight="700" fill="#15803d">Atomic room join</text>
  <text x="1210" y="609" font-size="12" fill="#166534">Conditional UpdateExpression (memberCount &lt; cap)</text>
  <text x="1210" y="628" font-size="12" fill="#166534">closes the &quot;last seat&quot; race — no one is turned away</text>

  <!-- Google OAuth -->
  <rect x="1174" y="690" width="362" height="92" rx="14" fill="#ffffff" stroke="#bfdbfe"/>
  <circle cx="1208" cy="724" r="14" fill="#fff" stroke="#e5e7eb"/>
  <text x="1201" y="730" font-size="17" font-weight="700" fill="#4285F4">G</text>
  <text x="1236" y="720" font-size="15" font-weight="700" fill="#1d4ed8">Google OAuth 2.0</text>
  <text x="1236" y="742" font-size="12.5" fill="#334155">Identity provider for NextAuth</text>
  <text x="1236" y="762" font-size="12.5" fill="#64748b">verified account → emoji-only to peers</text>

  <!-- ===================== ARROWS BETWEEN COLUMNS ===================== -->
  <!-- Client <-> Vercel front end / API -->
  <line x1="400" y1="242" x2="490" y2="242" stroke="#334155" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="490" y1="262" x2="400" y2="262" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="408" y="232" font-size="12" fill="#475569" font-weight="600">HTTPS · load app</text>

  <line x1="400" y1="486" x2="490" y2="470" stroke="#334155" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="404" y="506" font-size="12" fill="#475569" font-weight="600">fetch / poll (JSON)</text>
  <text x="404" y="524" font-size="11.5" fill="#94a3b8">/api/curve · /api/room · /api/profile</text>

  <!-- WebRTC signaling client -> call route -->
  <line x1="356" y1="700" x2="492" y2="595" stroke="#8b5cf6" stroke-width="2.2" stroke-dasharray="6 5" marker-end="url(#arrP)"/>
  <text x="362" y="690" font-size="11.5" fill="#7c3aed" font-weight="600">SDP / ICE only</text>

  <!-- Vercel API -> DynamoDB -->
  <line x1="1056" y1="430" x2="1172" y2="380" stroke="#FF9900" stroke-width="3" marker-end="url(#arrO)"/>
  <line x1="1172" y1="410" x2="1056" y2="470" stroke="#FF9900" stroke-width="2" marker-end="url(#arrO)"/>
  <rect x="1066" y="388" width="96" height="20" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="1072" y="402" font-size="11.5" fill="#c2410c" font-weight="700">AWS SDK v3</text>
  <text x="1066" y="430" font-size="11" fill="#9a3412">PutItem · Query GSI1 ·</text>
  <text x="1066" y="446" font-size="11" fill="#9a3412">UpdateItem · TTL writes</text>

  <!-- NextAuth -> Google -->
  <line x1="1056" y1="665" x2="1172" y2="724" stroke="#4285F4" stroke-width="2.5" marker-end="url(#arrB)"/>
  <text x="1066" y="690" font-size="11.5" fill="#1d4ed8" font-weight="700">OAuth 2.0</text>
  <text x="1066" y="706" font-size="11" fill="#3b82f6">redirect / callback</text>

  <!-- ===================== FLOW LEGEND ===================== -->
  <rect x="40" y="924" width="1520" height="92" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="62" y="952" font-size="15" font-weight="700" fill="#0f172a">Request flow</text>
  <g font-size="12.5" fill="#334155">
    <circle cx="70" cy="982" r="11" fill="#6366f1"/><text x="70" y="987" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
    <text x="90" y="980">Sign in (Google) →</text><text x="90" y="998" fill="#64748b">build permanent profile</text>

    <circle cx="320" cy="982" r="11" fill="#6366f1"/><text x="320" y="987" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2</text>
    <text x="340" y="980">Draw curve → POST /api/curve →</text><text x="340" y="998" fill="#64748b">Query GSI1 shape/affinity bucket</text>

    <circle cx="650" cy="982" r="11" fill="#6366f1"/><text x="650" y="987" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3</text>
    <text x="670" y="980">Atomic join into a room →</text><text x="670" y="998" fill="#64748b">poll GET /api/room/[id]</text>

    <circle cx="930" cy="982" r="11" fill="#6366f1"/><text x="930" y="987" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">4</text>
    <text x="950" y="980">Chat / voice notes / WebRTC call →</text><text x="950" y="998" fill="#64748b">audio P2P, signaling via DynamoDB</text>

    <circle cx="1270" cy="982" r="11" fill="#ef4444"/><text x="1270" y="987" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">5</text>
    <text x="1290" y="980">Midnight: DynamoDB TTL burns the room;</text><text x="1290" y="998" fill="#64748b">profile (no TTL) survives</text>
  </g>
</svg>
</div>
<div class="hint">To export: open in a browser → <b>Ctrl/Cmd+P</b> → “Save as PDF”, or take a full-page screenshot → PNG. Both formats are accepted by the hackathon form.</div>
</body>
</html>
